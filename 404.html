<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .container { display: flex; flex-direction: column; align-items: center; gap: 16px; color: #fff; font-family: sans-serif; text-align: center; padding: 24px; }
    .material-symbols-rounded { font-size: 64px; color: #888; }
    h1 { font-size: 2rem; font-weight: 700; }
    p { font-size: 0.95rem; color: #888; }
    span.hint { font-size: 0.8rem; color: #555; margin-top: 8px; transition: opacity 0.6s ease; }
  </style>
</head>
<body>
  <div class="container">
    <span class="material-symbols-rounded">error</span>
    <h1>Error</h1>
    <p>Oops, something went wrong.</p>
    <span class="hint" id="hint">Tap anywhere to retry</span>
  </div>
  <script>
    document.addEventListener('click', () => window.location.href = 'index.html');

    const hint = document.getElementById('hint');
    const messages = ['Tap anywhere to retry', 'You may be offline. Reconnect and tap to retry.'];
    let index = 0;

    setInterval(() => {
      hint.style.opacity = '0';
      setTimeout(() => {
        index = (index + 1) % messages.length;
        hint.textContent = messages[index];
        hint.style.opacity = '1';
      }, 600);
    }, 5000);
  </script>
</body>
</html>
